name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Railway environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production
      service:
        description: 'Railway service name'
        required: true
        default: 'recally-web'

concurrency:
  group: railway-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
      RAILWAY_SERVICE: ${{ github.event.inputs.service || 'recally-web' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify Railway auth
        run: railway whoami

      - name: Deploy to Railway
        run: |
          railway up \
            --service "$RAILWAY_SERVICE" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --ci
