name: Deploy to Railway

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Railway environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production
      service:
        description: 'Railway service name'
        required: true
        default: 'recally-web'

concurrency:
  group: railway-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: e54b6741-f790-47de-8147-adad987afe54
      RAILWAY_ENVIRONMENT: ${{ inputs.environment }}
      RAILWAY_SERVICE: ${{ inputs.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify Railway auth
        run: railway whoami

      - name: Link Railway project
        run: |
          railway link \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_SERVICE"

      - name: Deploy to Railway
        run: |
          railway up \
            --service "$RAILWAY_SERVICE" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --ci
